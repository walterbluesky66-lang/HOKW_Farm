<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Farm Helper · 牧场管理</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
</head>
<body data-page="ranch">
  <div class="app ranch-page">
    <header class="hero">
      <div>
        <div class="pill">🐮 牧场管理</div>
        <h1>牧场管理</h1>
        <p class="lead">直接填写 16 小时动物和 20 小时动物各养了多少只。工具会自动使用当前农场等级可用的最高等级动物，并按 3/4 催产时间提醒收获。</p>
      </div>
      <div class="actions">
        <a class="btn ghost" href="index.html">← 返回打卡</a>
        <a class="btn ghost" href="crop-archive.html">🗂️ 档案库</a>
        <a class="btn ghost" href="value-calculator.html">⚖️ 性价比</a>
      </div>
    </header>

    <main class="page-layout wide-page-layout">
      <section class="panel ranch-settings-panel">
        <div class="panel-head">
          <div class="panel-icon" style="background:#eef2ff;color:#4338ca;">⚙️</div>
          <div><h2>牧场设置</h2><p>栏位数量、动物摊等级和两类动物数量会自动保存；16 小时和 20 小时数量总和不会超过栏位数。</p></div>
        </div>

        <div class="form-grid ranch-settings-grid">
          <div class="field">
            <label for="ranchSlotCount">当前牧场栏位</label>
            <input id="ranchSlotCount" class="input" type="number" min="1" max="12" step="1" inputmode="numeric" value="1" />
          </div>
          <div class="field">
            <label for="ranchStallLevel">动物摊等级</label>
            <input id="ranchStallLevel" class="input" type="number" min="1" step="1" inputmode="numeric" value="1" />
          </div>
          <div class="field">
            <label for="ranchCount16">16小时动物数量</label>
            <input id="ranchCount16" class="input" type="number" min="0" max="12" step="1" inputmode="numeric" value="0" />
          </div>
          <div class="field">
            <label for="ranchCount20">20小时动物数量</label>
            <input id="ranchCount20" class="input" type="number" min="0" max="12" step="1" inputmode="numeric" value="0" />
          </div>
        </div>

        <div id="ranchSummary" class="ranch-summary"></div>
      </section>

      <section class="panel ranch-panel">
        <div class="panel-head">
          <div class="panel-icon" style="background:#ecfdf5;color:#047857;">🐾</div>
          <div><h2>批次计时</h2><p>每类动物只需要填写一次游戏里显示的剩余收获时间；点击“我收获了”会让这一类动物开始下一轮完整催产计时。</p></div>
        </div>

        <div id="ranchBatchList" class="ranch-slot-list ranch-batch-list"></div>
      </section>
    </main>
  </div>

  <div class="toast-zone" id="toastZone"></div>

  <script src="storage-keys.js"></script>
  <script src="cloud-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="cloud-sync.js"></script>
  <script src="app.js"></script>
</body>
</html>
